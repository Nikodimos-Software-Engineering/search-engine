<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocsSearch - Programming Documentation Search</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <h1>DocsSearch</h1>
            </div>
            
            <div class="search-box-container">
                <div class="search-box">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search Python documentation, tutorials, references..." 
                        autocomplete="off"
                    >
                    <button id="searchBtn" class="btn-primary">Search</button>
                </div>
                <div class="search-hints">
                    Try: <span class="hint" data-query="python list comprehension">list comprehension</span>, 
                    <span class="hint" data-query="python decorators">decorators</span>, 
                    <span class="hint" data-query="async await python">async/await</span>
                </div>
            </div>

            <div class="stats-bar">
                <div id="stats" class="stats">No documents indexed yet</div>
                <a href="/admin" class="admin-link">Admin Login</a>
            </div>
        </header>

        <main class="results-container" id="resultsContainer">
            <div class="empty-state" id="emptyState">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                </svg>
                <h2>Ready to Search</h2>
                <p>Enter a search query above to find programming documentation.</p>
            </div>
        </main>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p id="loadingText">Searching...</p>
        </div>

        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
