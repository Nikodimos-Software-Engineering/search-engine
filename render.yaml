
services:
  - type: web
    name: docssearch-api
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docssearch-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: docssearch-db
    databaseName: search_engine
    user: searchuser
    plan: free
